<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Não Era Só um Jogo</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background-color: #0b0e1a;
    color: #eaeaea;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100svh;
}

.game-container {
    width: min(92vw, 420px);
    background: #11152b;
    border: 4px solid #6afff3;
    box-shadow: 0 0 20px #00fff7;
    padding: 16px;
}

.title {
    text-align: center;
    font-size: clamp(12px, 4vw, 14px);
    margin-bottom: 12px;
    color: #6afff3;
}

.screen {
    background: #060914;
    border: 2px solid #333;
    padding: 14px;
    margin-bottom: 12px;
    font-size: clamp(10px, 3.8vw, 11px);
    min-height: 34svh;
    line-height: 1.7;
}

.choices button {
    width: 100%;
    background: #1c2145;
    border: 2px solid #6afff3;
    color: #eaeaea;
    padding: 14px;
    margin-top: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(9px, 3.6vw, 10px);
    cursor: pointer;
}

.choices button:hover {
    background: #6afff3;
    color: #0b0e1a;
}

.footer {
    font-size: clamp(6px, 2.5vw, 7px);
    text-align: center;
    color: #888;
    margin-top: 10px;
}

/* GLITCH */
.glitch {
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% { transform: translate(0); }
    25% { transform: translate(-2px, 2px); }
    50% { transform: translate(2px, -2px); }
    75% { transform: translate(-2px, -2px); }
    100% { transform: translate(0); }
}
</style>
</head>

<body>

<div class="game-container" id="game">
    <div class="title">NÃO ERA SÓ UM JOGO</div>
    <div class="screen" id="text"></div>
    <div class="choices" id="choices"></div>
    <div class="footer">Pixel Narrative Game • HTML</div>
</div>

<script>
const textElement = document.getElementById("text");
const choicesElement = document.getElementById("choices");
const game = document.getElementById("game");

function beep() {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    osc.type = "square";
    osc.frequency.value = 600;
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.05);
}

function vibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
}

function typeWriter(text, callback) {
    textElement.innerHTML = "";
    let i = 0;
    const interval = setInterval(() => {
        textElement.innerHTML += text[i] === "\n" ? "<br>" : text[i];
        i++;
        if (i >= text.length) {
            clearInterval(interval);
            if (callback) callback();
        }
    }, 20);
}

function showText(text, choices = [], danger = false) {
    choicesElement.innerHTML = "";
    if (danger) {
        vibrate(100);
        game.classList.add("glitch");
        setTimeout(() => game.classList.remove("glitch"), 500);
    }
    typeWriter(text, () => {
        choices.forEach(choice => {
            const button = document.createElement("button");
            button.innerText = choice.text;
            button.onclick = () => {
                beep();
                choice.action();
            };
            choicesElement.appendChild(button);
        });
    });
}

/* HISTÓRIA */

showText(
`Você entrou em um novo jogo online.

Chat ativado.
Nickname: Player_X.

Alguém entra na partida...`,
[
    { text: "Continuar", action: sceneChat }
]
);

function sceneChat() {
    showText(
`[???]: eae, joga bem
[???]: vc parece novo aqui`,
[
    { text: "Responder", action: responder },
    { text: "Ignorar", action: ignorar }
]);
}

function responder() {
    showText(
`[???]: quantos anos vc tem?`,
[
    { text: "14", action: idade },
    { text: "Mentir", action: mentir }
], true);
}

function idade() {
    showText(
`[???]: manda uma foto pra eu ver com quem jogo`,
[
    { text: "Enviar foto", action: finalRuim },
    { text: "Denunciar", action: finalBom }
], true);
}

function mentir() {
    showText(
`[???]: entra no meu server privado`,
[
    { text: "Entrar", action: finalMuitoRuim },
    { text: "Bloquear", action: finalBom }
], true);
}

function ignorar() {
    showText(
`O jogador insiste.
Nenhuma proteção aparece.`,
[
    { text: "Sair", action: mensagemFinal }
]);
}

/* FINAIS */

function finalRuim() {
    showText(
`Sua imagem começa a circular fora do jogo.

Você não estava jogando.
Você estava em risco.`,
[
    { text: "Finalizar", action: mensagemFinal }
], true);
}

function finalMuitoRuim() {
    showText(
`Mensagens estranhas.
Pedidos pioram.

Era uma armadilha.`,
[
    { text: "Finalizar", action: mensagemFinal }
], true);
}

function finalBom() {
    showText(
`Conta derrubada.
Denúncia aceita.

Alguém te protegeu.`,
[
    { text: "Finalizar", action: mensagemFinalBoa }
]);
}

function mensagemFinal() {
    showText(
`ANTES DO ECA DIGITAL
Internet sem proteção real.`,
[
    { text: "Reiniciar", action: () => location.reload() }
]);
}

function mensagemFinalBoa() {
    showText(
`COM O ECA DIGITAL
Plataformas devem proteger.`,
[
    { text: "Reiniciar", action: () => location.reload() }
]);
}
</script>

</body>
</html>
