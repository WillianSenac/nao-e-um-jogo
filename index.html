<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Não Era Só um Jogo</title>

https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background-color: #0b0e1a;
    color: #eaeaea;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100svh;
}

/* ===== CONTAINER ===== */
.game-container {
    width: min(92vw, 420px);
    background: #11152b;
    border: 4px solid #6afff3;
    box-shadow: 0 0 20px #00fff7;
    padding: 16px;
}

/* ===== TEXTO ===== */
.title {
    text-align: center;
    font-size: clamp(12px, 4vw, 14px);
    margin-bottom: 12px;
    color: #6afff3;
}

.screen {
    background: #060914;
    border: 2px solid #333;
    padding: 14px;
    margin-bottom: 12px;
    font-size: clamp(10px, 3.8vw, 11px);
    min-height: 34svh;
    line-height: 1.7;
}

/* ===== BOTÕES ===== */
.choices button {
    width: 100%;
    background: #1c2145;
    border: 2px solid #6afff3;
    color: #eaeaea;
    padding: 14px;
    margin-top: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(9px, 3.6vw, 10px);
    cursor: pointer;
    transition: 0.2s;
}

.choices button:hover,
.choices button:active {
    background: #6afff3;
    color: #0b0e1a;
}

/* ===== FOOTER ===== */
.footer {
    font-size: clamp(6px, 2.5vw, 7px);
    text-align: center;
    color: #888;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="game-container">
    <div class="title">NÃO ERA SÓ UM JOGO</div>
    <div class="screen" id="text"></div>
    <div class="choices" id="choices"></div>
    <div class="footer">Pixel Narrative Game • HTML</div>
</div>

<script>
const textElement = document.getElementById("text");
const choicesElement = document.getElementById("choices");

function showText(text, choices = []) {
    textElement.innerHTML = text.replace(/\n/g, "<br>");
    choicesElement.innerHTML = "";

    choices.forEach(choice => {
        const button = document.createElement("button");
        button.innerText = choice.text;
        button.onclick = choice.action;
        choicesElement.appendChild(button);
    });
}

// INÍCIO
showText(
`Você entrou em um novo jogo online.

Chat ativado.
Microfone desligado.
Nickname: Player_X.

Alguém entra na partida e te envia mensagem...`,
[
    { text: "Continuar", action: sceneChat }
]
);

function sceneChat() {
    showText(
`[???]: eae, joga bem
[???]: vc parece novo aqui

O jogador usa um avatar raro.
Algo chama sua atenção.`,
    [
        { text: "Responder normalmente", action: responder },
        { text: "Ignorar mensagens", action: ignorar }
    ]
);
}

function responder() {
    showText(
`valeu
[???]: quantos anos vc tem?

A pergunta não parece importante...
mas o chat ficou em silêncio.`,
    [
        { text: "Responder a idade real", action: idade },
        { text: "Mentir a idade", action: mentir },
        { text: "Sair do chat", action: sair }
    ]
);
}

function idade() {
    showText(
`14
[???]: relaxa, é de boa
[???]: manda uma foto pra eu ver com quem jogo 😄`,
    [
        { text: "Enviar foto", action: finalRuim },
