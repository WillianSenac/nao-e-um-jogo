<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dados Invisíveis</title>

<!-- FONTE PIXEL -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0b0e1a;
    color: #eee;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    font-size: 12px;
    margin: 12px;
    color: #6afff3;
}

#hud {
    width: 90%;
    margin-bottom: 8px;
}

#bar {
    width: 100%;
    height: 14px;
    border: 2px solid #6afff3;
    background: #111;
}

#barFill {
    height: 100%;
    width: 100%;
    background: #6afff3;
}

canvas {
    background: #060914;
    border: 3px solid #6afff3;
}

#controls {
    margin-top: 12px;
    display: grid;
    grid-template-columns: 60px 60px 60px;
    gap: 8px;
}

button {
    padding: 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    background: #1c2145;
    color: #fff;
    border: 2px solid #6afff3;
}

#ecaBtn {
    margin-top: 10px;
    background: #6afff3;
    color: #000;
}
</style>
</head>

<body>

<h1>DADOS INVISÍVEIS</h1>

<div id="hud">
    <div id="bar">
        <div id="barFill"></div>
    </div>
</div>

<canvas id="game" width="260" height="260"></canvas>

<div id="controls">
    <div></div>
    <button onclick="move(0,-1)">▲</button>
    <div></div>
    <button onclick="move(-1,0)">◀</button>
    <button onclick="move(1,0)">▶</button>
    <div></div>
    <div></div>
    <button onclick="move(0,1)">▼</button>
    <div></div>
</div>

<button id="ecaBtn" onclick="activateECA()">ATIVAR ECA DIGITAL</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 120, y: 120, size: 10 };
let identity = 100;
let speed = 4;
let ecaActive = false;

const apps = [
    {x: 40, y: 40},
    {x: 200, y: 60},
    {x: 60, y: 200},
    {x: 200, y: 200},
];

function draw() {
    ctx.clearRect(0,0,260,260);

    // apps
    ctx.fillStyle = ecaActive ? "#333" : "#ff4d6d";
    apps.forEach(a => {
        ctx.fillRect(a.x, a.y, 12, 12);
    });

    // player
    ctx.fillStyle = "#6afff3";
    ctx.fillRect(player.x, player.y, player.size, player.size);
}

function move(dx,dy) {
    player.x += dx * speed;
    player.y += dy * speed;

    apps.forEach(a => {
        if (!ecaActive &&
            player.x < a.x+12 &&
            player.x+10 > a.x &&
            player.y < a.y+12 &&
            player.y+10 > a.y) {

            identity -= 10;
            speed = Math.max(1, speed - 0.5);
            updateBar();
        }
    });

    draw();
}

function updateBar() {
    document.getElementById("barFill").style.width = identity + "%";
}

function activateECA() {
